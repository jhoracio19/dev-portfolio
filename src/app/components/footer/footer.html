<footer class="mt-20 py-12 border-t border-slate-800/50 text-center relative z-10">
  <div class="max-w-xl mx-auto mb-8 flex flex-col items-center gap-4">
    <button
      (click)="copyEmail()"
      class="group relative inline-flex items-center gap-3 bg-slate-800/80 hover:bg-slate-700/80 backdrop-blur-md text-white px-6 py-3 rounded-full font-bold border border-slate-700 transition-all hover:scale-105 overflow-hidden"
    >
      <div class="absolute inset-0 bg-gradient-to-r from-sky-500/20 to-blue-500/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
      
      @if (emailCopied()) {
        <i class="fas fa-check text-emerald-400"></i>
        <span class="text-emerald-400">{{ t().contact.email_copied }}</span>
      } @else {
        <i class="fas fa-copy text-sky-400 group-hover:animate-bounce"></i>
        <span>{{ t().contact.copy_email }}</span>
      }
    </button>
  </div>

  <div class="flex justify-center gap-6 mb-6">
    <a href="https://github.com/jhoracio19" target="_blank" class="text-slate-400 hover:text-white transition-colors text-2xl hover:scale-110">
      <i class="fab fa-github"></i>
    </a>
    <a href="https://www.linkedin.com/in/jhoracio19/" target="_blank" class="text-slate-400 hover:text-sky-500 transition-colors text-2xl hover:scale-110">
      <i class="fab fa-linkedin"></i>
    </a>
    <a href="mailto:jhoracio19@hotmail.com" class="text-slate-400 hover:text-red-400 transition-colors text-2xl hover:scale-110">
      <i class="fas fa-envelope"></i>
    </a>
  </div>
  
  <p class="text-slate-500 text-xs font-mono">Diseñado y desarrollado por José Horacio © 2026</p>
</footer>
