<section id="proyectos" class="py-24 px-6 max-w-7xl mx-auto">
  <div class="flex flex-col md:flex-row md:items-center justify-between mb-12 gap-6">
    <h2 class="text-3xl font-bold text-white flex items-center gap-3" data-aos="fade-right">
      <span class="text-sky-500 font-mono tracking-tighter">< /></span>
      Proyectos Relevantes
    </h2>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
    @for (project of featuredProjects; track project.id) {
    <article
      data-aos="fade-up"
      class="glass-card group bg-[#0a0c10] rounded-3xl overflow-hidden border border-slate-800 shadow-2xl transition-all hover:border-sky-500/50"
    >
      <div class="aspect-video bg-slate-800 relative overflow-hidden">
        <img
          [src]="project.image"
          [alt]="project.title"
          class="w-full h-full object-cover transition-transform group-hover:scale-105"
        />
      </div>
      <div class="p-8">
        <h3 class="text-2xl font-bold text-white mb-3 group-hover:text-sky-400 transition-colors">
          {{ project.title }}
        </h3>
        <div class="flex flex-wrap gap-2 mb-4">
          @for (tech of project.technologies; track tech) {
          <span
            class="px-3 py-1 bg-sky-500/10 text-sky-400 text-[10px] font-bold uppercase tracking-wider rounded-full border border-sky-500/20"
          >
            {{ tech }}
          </span>
          }
        </div>
        <p class="text-slate-400 text-sm leading-relaxed mb-6">
          {{ project.description }}
        </p>
        <div class="flex flex-wrap gap-3">
          <a
            [href]="project.githubUrl"
            target="_blank"
            class="inline-flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold border border-slate-700 transition-transform hover:scale-105"
          >
            <i class="fab fa-github"></i> Code
          </a>
          @if (project.demoUrl) {
          <a
            [href]="project.demoUrl"
            target="_blank"
            class="inline-flex items-center gap-2 bg-sky-600 hover:bg-sky-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-transform hover:scale-105"
          >
            <i class="fas fa-external-link-alt text-xs"></i> Demo
          </a>
          }
        </div>
      </div>
    </article>
    }
  </div>

  <div class="mt-16 text-center" data-aos="zoom-in">
    <a
      routerLink="/proyectos"
      class="inline-flex items-center gap-3 bg-sky-600 hover:bg-sky-500 text-white px-10 py-4 rounded-2xl font-bold transition-all hover:scale-105 shadow-lg shadow-sky-900/20"
    >
      Ver todos los proyectos
      <i class="fas fa-arrow-right text-sm"></i>
    </a>
  </div>
</section>
