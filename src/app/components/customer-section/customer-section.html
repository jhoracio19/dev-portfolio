<section class="py-24 px-6 max-w-7xl mx-auto">
  <h2 class="text-3xl font-bold text-white mb-12 flex items-center gap-3" data-aos="fade-right">
    <span class="text-sky-500 font-mono tracking-tighter">< /></span>
    Resultados Reales con Ingeniería Digital
  </h2>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
    <article
      *ngFor="let cliente of clientes"
      data-aos="fade-up"
      class="glass-card group bg-[#0a0c10] rounded-3xl overflow-hidden border border-slate-800 shadow-2xl transition-all hover:border-sky-500/50"
    >
      <div class="p-8">
        <div class="flex flex-wrap gap-2 mb-4">
          <span
            class="px-3 py-1 bg-sky-500/10 text-sky-400 text-[10px] font-bold uppercase tracking-wider rounded-full border border-sky-500/20"
          >
            {{ cliente.categoria }}
          </span>
        </div>

        <h3 class="text-2xl font-bold text-white mb-2 group-hover:text-sky-400 transition-colors">
          {{ cliente.nombreNegocio }}
        </h3>

        <p class="text-emerald-400 text-xs font-bold uppercase tracking-widest mb-4">
          {{ cliente.logroPrincipal }}
        </p>

        <p class="text-slate-400 text-sm leading-relaxed mb-6 italic">"{{ cliente.testimonio }}"</p>

        <div class="flex flex-wrap gap-3">
          <a
            *ngIf="cliente.urlWeb"
            [href]="cliente.urlWeb"
            target="_blank"
            class="inline-flex items-center gap-2 bg-sky-600 hover:bg-sky-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-transform hover:scale-105"
          >
            <i class="fas fa-external-link-alt text-xs"></i> Ver sitio en vivo
          </a>
        </div>
      </div>
    </article>
  </div>
</section>
